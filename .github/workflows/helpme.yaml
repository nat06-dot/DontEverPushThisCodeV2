name: DevSecOps Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write   # TODO#0a: upload SARIF to GitHub Security tab
  issues: write            # TODO#0b: Gitleaks/Sonar can comment on PRs + issues
  pull-requests: write     # TODO#0b
  id-token: write          # TODO#0c: OIDC token
  actions: read

jobs:
    secret-scanning:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0  # TODO#1: full history so TruffleHog can diff all commits

            - name: Run TruffleHog
              uses: trufflesecurity/trufflehog@main
              continue-on-error: true
              with:
                path: ./
                base: ${{ github.event.repository.default_branch }}
                head: HEAD   # TODO#2: scan diff from base to HEAD
                extra_args: --only-verified  # TODO#3: report only verified secrets

            # TODO#4: Gitleaks step
            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@v2
              continue-on-error: true
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
                GITLEAKS_ENABLE_SUMMARY: true

    sast-scan:
        runs-on: ubuntu-latest
        needs: secret-scanning
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0  # TODO#5: full history for blame/new-code detection

            # TODO#6: SonarQube scan
            - name: SonarQube Scan
              uses: SonarSource/sonarqube-scan-action@v7.1.0
              continue-on-error: true
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    codeql-scan:
        runs-on: ubuntu-latest
        needs: secret-scanning
        if: ${{ !cancelled() }}
        strategy:
            matrix:
                language: [ 'javascript' ]  # TODO#7: Next.js/React uses JavaScript
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Initialize CodeQL
              uses: github/codeql-action/init@v3
              with:
                languages: ${{ matrix.language }}
                queries: security-extended,security-and-quality  # TODO#8

            # TODO#9: analyze step
            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@v3
              with:
                category: "/language:${{ matrix.language }}"

    dependency-scanning:
        runs-on: ubuntu-latest
        needs: [sast-scan, secret-scanning]
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            # TODO#10: setup Node 20
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                node-version: '20'

            # TODO#11: install deps
            - name: Install dependencies
              run: npm ci

            - name: Depcheck
              uses: dependency-check/Dependency-Check_Action@main
              continue-on-error: true
              id: Depcheck
              with:
                project: 'DontEverPushThisCodeV2'
                path: '.'
                format: 'SARIF'   # TODO#12: SARIF integrates with GitHub Security tab
                out: 'reports'
                args: >
                    --failOnCVSS 7    
                    --enableRetired

            # TODO#14: upload Depcheck SARIF
            - name: Upload Depcheck SARIF to Security tab
              if: always()
              uses: github/codeql-action/upload-sarif@v3
              continue-on-error: true
              with:
                  sarif_file: reports/dependency-check-report.sarif
                  category: dependency-check

            # TODO#15: upload raw report
            - name: Upload Depcheck HTML report as artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: depcheck-report
                path: reports/

    image-scanning:
        runs-on: ubuntu-latest
        needs: [dependency-scanning]
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            # TODO#16: build Docker image
            - name: Build Docker image
              run: docker build -t my-app:latest .

            - name: Trivy Scan
              uses: aquasecurity/trivy-action@master
              continue-on-error: true
              with:
                image-ref: 'my-app:latest'
                format: 'sarif'          # TODO#17: sarif for Security tab
                output: 'trivy-results.sarif'
                severity: 'HIGH,CRITICAL'  # TODO#18: report HIGH and CRITICAL
                ignore-unfixed: true       # TODO#19: skip CVEs with no fix

            # TODO#20: upload Trivy SARIF
            - name: Upload Trivy SARIF to Security tab
              if: always()
              uses: github/codeql-action/upload-sarif@v3
              continue-on-error: true
              with:
                sarif_file: trivy-results.sarif
                category: trivy

            # TODO#21: upload trivy sarif as artifact
            - name: Upload Trivy results as artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: trivy-results
                path: trivy-results.sarif
